services:
  mariadb12:
    build:
      context: ../mariadb12
    image: activity-manager-mariadb12:bookworm
    container_name: activity-manager-mariadb12
    environment:
      DB_NAME: taskmgr_db
      DB_USER: taskmgr_user
      DB_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin --user=root --host=127.0.0.1 --port=3306 ping --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "3306:3306"

  tests:
    build:
      context: .
      dockerfile: Dockerfile.debian12
    image: activity-manager-tests:debian12
    depends_on:
      mariadb12:
        condition: service_healthy
    environment:
      DBCONFIG: mysql
      MYSQL_DRIVER: com.mysql.cj.jdbc.Driver
      MYSQL_URL: jdbc:mysql://mariadb12:3306/taskmgr_db?useSSL=false&serverTimezone=UTC
      MYSQL_USER: taskmgr_user
      MYSQL_PASSWORD: secret
      DB_HOST: mariadb12
      DB_PORT: "3306"
    volumes:
      - ../../..:/workspace
      - activity-manager-m2:/m2

volumes:
  activity-manager-m2:
