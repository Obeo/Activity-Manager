services:
  mysql55:
    build:
      context: ../mysql55
    image: activity-manager-mysql55:5.5.47
    container_name: activity-manager-mysql55
    environment:
      MYSQL_DATABASE: taskmgr_db
      MYSQL_USER: taskmgr_user
      MYSQL_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "/opt/mysql/bin/mysqladmin --user=root --host=127.0.0.1 --port=3306 ping --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "3306:3306"

  tests:
    build:
      context: .
    image: activity-manager-tests
    depends_on:
      mysql55:
        condition: service_healthy
    environment:
      DBCONFIG: mysql
      MYSQL_DRIVER: com.mysql.jdbc.Driver
      MYSQL_URL: jdbc:mysql://mysql55:3306/taskmgr_db
      MYSQL_USER: taskmgr_user
      MYSQL_PASSWORD: secret
      DB_HOST: mysql55
      DB_PORT: "3306"
    volumes:
      - ../../..:/workspace
      - activity-manager-m2:/m2

volumes:
  activity-manager-m2:
